name: "Auto Web Scraping Only"

on:
  schedule:
    - cron: '30 1 * * *' # Rulează automat în fiecare noapte la 04.30
  workflow_dispatch:   # Permite pornirea manuală din interfața GitHub

jobs:
  build_dataset:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 ddgs

    - name: Web pages to be scraped
      run: python export_pages.py

    - name: Run Web Scraper
      id: run_scraper
      env:
        SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      run: |
        python web_scrape.py
        if [ -f ansible_python_dataset.json ]; then
          FILE_SIZE=$(du -sh ansible_python_dataset.json | cut -f1)
          echo "dataset_size=$FILE_SIZE" >> $GITHUB_OUTPUT
        else
          echo "dataset_size=0KB" >> $GITHUB_OUTPUT
        fi

    - name: Commit and Push Changes to Repository
      env:
        RECON_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO_NAME: ${{ github.repository }}
        BRANCH_NAME: ${{ github.ref_name }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@github.com"
        git add ansible_python_dataset.json saved_links.txt
        git commit -m "🤖 Auto-update raw dataset from cloud scraping [skip ci]" || echo "No changes to commit"
        git push https://x-access-token:$RECON_TOKEN@github.com/$REPO_NAME.git HEAD:$BRANCH_NAME

    # ==========================================
    # ALERTA 1: NOTIFICARE DE SUCCES (SLACK)
    # ==========================================
    - name: Send Slack Success Notification
      if: success()
      uses: slackapi/slack-github-action@v1.26.0
      with:
        payload: |
          {
            "attachments": [
              {
                "color": "#2eb886",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "🟢 *Cloud Scraper Bot* \nWeb scrape finalized! Data from internet saved în repository."
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Status:*\nData Collected" },
                      { "type": "mrkdwn", "text": "*Dataset Size:*\n`${{ steps.run_scraper.outputs.dataset_size }}`" }
                    ]
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

    # ==========================================
    # ALERTA 2: NOTIFICARE ÎN CAZ DE EROARE (SLACK)
    # ==========================================
    - name: Send Slack Failure Notification
      if: failure()
      uses: slackapi/slack-github-action@v1.26.0
      with:
        payload: |
          {
            "attachments": [
              {
                "color": "#a30200",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "🔴 *Pipeline Execution Failed!*"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "Error on web scraping în GitHub Actions.\n*Repository:* `${{ github.repository }}`"
                    }
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
